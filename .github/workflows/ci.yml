name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: afflux_test
          POSTGRES_USER: afflux
          POSTGRES_PASSWORD: afflux_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: pnpm test:run

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://afflux:afflux_test_password@localhost:5432/afflux_test
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: ci-test-secret-must-be-32-chars-long
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Push DB schema
        run: npx dotenv -e /dev/null -- drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://afflux:afflux_test_password@localhost:5432/afflux_test

      - name: Start server for E2E
        run: pnpm start &
        env:
          DATABASE_URL: postgresql://afflux:afflux_test_password@localhost:5432/afflux_test
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: ci-test-secret-must-be-32-chars-long
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PORT: 3001

      - name: Wait for server
        run: npx wait-on http://localhost:3001/api/health --timeout 30000

      - name: E2E tests
        run: pnpm test:e2e
        env:
          BASE_URL: http://localhost:3001
